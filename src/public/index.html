<!DOCTYPE html>
<html lang="en" class="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Arb Alert — Cross-Exchange Spread Monitor</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <h1>ARB ALERT</h1>
    </div>
    <div class="topbar-status">
      <span id="telegram-status" class="pill">Telegram: —</span>
      <span id="last-tick" class="pill">Last tick: —</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel" aria-labelledby="spreads-title">
      <div class="panel-head">
        <h2 id="spreads-title">Live Spreads <span id="pair-count" class="pair-count"></span></h2>
        <div id="exchange-health" class="health-row" aria-label="Exchange health"></div>
      </div>
      <div class="table-controls">
        <input id="pair-search" type="search" placeholder="Search pair (e.g. BTC)" aria-label="Search pair" />
      </div>
      <div class="table-wrap table-wrap-tall">
        <table class="spread-table">
          <thead>
            <tr>
              <th scope="col">Pair</th>
              <th scope="col">Buy</th>
              <th scope="col">Sell</th>
              <th scope="col" class="num">Gross</th>
              <th scope="col" class="num">Fees</th>
              <th scope="col" class="num">
                <button id="sort-spread" type="button" class="sort-btn" aria-label="Sort by net spread">
                  Net Spread <span id="sort-arrow" aria-hidden="true">&#9660;</span>
                </button>
              </th>
            </tr>
          </thead>
          <tbody id="spread-rows">
            <tr><td colspan="6" class="empty">Waiting for first tick…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="panel" aria-labelledby="settings-title">
      <div class="panel-head">
        <h2 id="settings-title">Settings</h2>
      </div>
      <form id="settings-form" class="settings">
        <div class="field">
          <label for="threshold">Alert threshold — NET spread after fees (%)</label>
          <input id="threshold" name="threshold" type="number" step="0.01" min="-10" max="100" required />
        </div>
        <div class="field">
          <label for="cooldown">Alert cooldown (minutes)</label>
          <input id="cooldown" name="cooldown" type="number" step="1" min="0" max="1440" required />
        </div>
        <fieldset class="field">
          <legend>Taker fees per exchange (%)</legend>
          <div id="fee-inputs" class="fee-grid"></div>
        </fieldset>
        <fieldset class="field">
          <legend>Monitored pairs (top by 24h volume)</legend>
          <input id="toggle-search" type="search" placeholder="Filter pairs" aria-label="Filter pair toggles" />
          <div id="pair-toggles" class="toggles toggles-scroll"></div>
        </fieldset>
        <button type="submit" class="save-btn">Save settings</button>
        <p id="settings-msg" class="msg" role="status"></p>
      </form>
    </section>

    <section class="panel panel-wide" aria-labelledby="alerts-title">
      <div class="panel-head">
        <h2 id="alerts-title">Recent Alerts</h2>
      </div>
      <ul id="alert-list" class="alerts">
        <li class="empty">No alerts yet.</li>
      </ul>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
